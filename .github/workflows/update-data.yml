name: Update childcare data

on:
  schedule:
    # 3 AM SGT = 19:00 UTC
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        scraper: [ecda_data_gov, ecda_upcoming, lifesg_fees, myfirstskool]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run scraper
        run: uv run python -m scrapers.${{ matrix.scraper }}

      - name: Upload data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: data-${{ matrix.scraper }}
          path: data/

  commit:
    needs: scrape
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download all scraper artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: data/
          merge-multiple: true

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes, skipping commit."
          else
            git commit -m "chore: update childcare data [skip ci]"
            git push
          fi
