name: Update childcare data

on:
  schedule:
    # 3 AM SGT = 19:00 UTC
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        scraper: [ecda_data_gov, ecda_upcoming, myfirstskool, pcf_sparkletots, my_world_preschool, ebridge, skool4kidz, moe_kindergartens, learning_vision, star_learners]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run scraper
        run: uv run python -m scrapers.${{ matrix.scraper }}
        env:
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}

      - name: Stage scraper output
        if: success()
        run: |
          mkdir -p /tmp/new-data
          git ls-files --others --exclude-standard data/ | while IFS= read -r f; do
            cp "$f" /tmp/new-data/
          done
          git diff --name-only HEAD -- data/ | while IFS= read -r f; do
            cp "$f" /tmp/new-data/
          done
          echo "Files staged for upload:"
          ls /tmp/new-data/ || echo "(none)"

      - name: Upload data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: success()
        with:
          name: data-${{ matrix.scraper }}
          path: /tmp/new-data/
          if-no-files-found: warn

  scrape-lifesg-fees:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run scraper
        run: uv run python -m scrapers.lifesg_fees
        env:
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}

      - name: Stage scraper output
        if: success()
        run: |
          mkdir -p /tmp/new-data
          git ls-files --others --exclude-standard data/ | while IFS= read -r f; do
            cp "$f" /tmp/new-data/
          done
          git diff --name-only HEAD -- data/ | while IFS= read -r f; do
            cp "$f" /tmp/new-data/
          done
          echo "Files staged for upload:"
          ls /tmp/new-data/ || echo "(none)"

      - name: Upload data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: success()
        with:
          name: data-lifesg_fees
          path: /tmp/new-data/
          if-no-files-found: warn

  commit:
    needs: [scrape, scrape-lifesg-fees]
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download all scraper artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: data/
          merge-multiple: true

      - name: Validate and repair key data files
        run: |
          python3 - <<'EOF'
          import json, subprocess, sys
          key_files = ["data/ecda_centres-latest.json"]
          for f in key_files:
              try:
                  with open(f) as fp:
                      json.load(fp)
                  print(f"OK: {f}")
              except (json.JSONDecodeError, FileNotFoundError) as e:
                  print(f"Corrupted or missing: {f} ({e}) — restoring from git", file=sys.stderr)
                  subprocess.run(["git", "checkout", "HEAD", "--", f], check=False)
          EOF

      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Geocode centres
        run: uv run python -m scrapers.geocode

      - name: Merge datasets
        run: uv run python -m scrapers.merge

      - name: Generate web data
        run: uv run python -m scrapers.web_export

      - name: Generate value reports
        run: uv run python -m scrapers.report

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No data changes, skipping commit."
          else
            git commit -m "chore: update childcare data [skip ci]"
            git push
          fi

  deploy-pages:
    needs: commit
    if: always() && needs.commit.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
